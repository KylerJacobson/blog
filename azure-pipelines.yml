trigger:
- main

pool: Default

steps:

- script: |
    ./mvnw package
  displayName: 'Build JAR'

- script: docker build -t kylerjacobson.dev .
  displayName: 'Build Docker Image'

- script: |
    docker login kyler.azurecr.io -u $(acr-user) -p $(acr-pass)
    docker tag kylerjacobson.dev kylers.azurecr.io/kylerjacobson.dev
    docker push kylers.azurecr.io/kylerjacobson.dev:latest